# Render blueprint — deploys the FastAPI signing service from this repo.
# Dashboard: New -> Blueprint -> select this repository. Fill in the secret
# env vars when prompted (values match the GitHub Actions secrets; see
# docs/TESTING.md "Backend deployment" and issue #2).
services:
  - type: web
    name: prowalco-calibration-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    branch: main
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # PoC signing key: auto-generated at boot (ephemeral, loudly logged).
      # For a stable key, set SIGNING_KEY_PEM_B64 + SIGNING_CERT_PEM_B64
      # instead; production milestone is a KMS-held key.
      - key: SIGNING_AUTOGENERATE_DEV_KEY
        value: "true"
      # Device binding (#51): flip to "true" once TESTING.md confirms devices
      # enroll and sign correctly. ADMIN_EMAILS approves/revokes enrollments.
      - key: DEVICE_BINDING_ENFORCE
        value: "false"
      - key: ADMIN_EMAILS
        sync: false
      # OnKey (#47): credentials live ONLY here (Render Environment). Flip
      # WORKORDER_PROVIDER to "onkey" once the provider mapping lands.
      - key: WORKORDER_PROVIDER
        value: "simulated"
      - key: ONKEY_BASE_URL
        sync: false
      - key: ONKEY_USERNAME
        sync: false
      - key: ONKEY_PASSWORD
        sync: false
