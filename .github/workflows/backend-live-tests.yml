name: backend-live-tests

# Applies the schema to the real Supabase project ("db push") and runs the
# full backend test suite against it — production parity, no test doubles.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   SUPABASE_URL               https://<project-ref>.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY  service_role secret (server-only)
#   SUPABASE_ANON_KEY          anon / publishable key
#   SUPABASE_DB_PASSWORD       raw database password (CI derives the pooler
#                              connection string automatically), OR set
#   DATABASE_URL               full session-pooler connection string instead

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/prowalco-calibration-app-5zl650
    paths:
      - "backend/**"
      - "shared/schema/json/**"
      - ".github/workflows/backend-live-tests.yml"

# The suite shares one Supabase project — never run two suites at once.
concurrency:
  group: supabase-live
  cancel-in-progress: false

jobs:
  schema-tests:
    name: Shared schema (zod) tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: shared/schema
      - run: npm test
        working-directory: shared/schema
      - name: Verify exported JSON Schema is up to date
        run: |
          npm run export-json-schema
          git diff --exit-code -- json || {
            echo "::error::shared/schema/json is stale — run npm run schema:export and commit"; exit 1; }
        working-directory: shared/schema

  live-backend-tests:
    name: Migrate + test against Supabase
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets are configured
        run: |
          missing=""
          [ -z "$SUPABASE_URL" ] && missing="$missing SUPABASE_URL"
          [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] && missing="$missing SUPABASE_SERVICE_ROLE_KEY"
          [ -z "$DATABASE_URL" ] && [ -z "$SUPABASE_DB_PASSWORD" ] && missing="$missing DATABASE_URL-or-SUPABASE_DB_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing repository secrets:$missing — see the header of this workflow file"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Resolve DATABASE_URL from password (if not set directly)
        run: python scripts/resolve_database_url.py

      - name: Apply schema + ensure storage bucket (db push)
        run: python scripts/apply_migrations.py

      - name: Run live test suite
        run: python -m pytest tests/ -q
