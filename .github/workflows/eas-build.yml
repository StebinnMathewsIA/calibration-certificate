name: eas-build

# Builds the mobile app in Expo's cloud (EAS) — triggerable from anywhere,
# no local computer needed.
#
# Required repository secret:
#   EXPO_TOKEN   Expo access token (expo.dev -> Account Settings -> Access tokens)
#
# The build is queued with --no-wait; the job summary links to the Expo build
# page where the APK / install QR appears when the build finishes.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        type: choice
        default: android
        options: [android, ios]
      profile:
        description: "eas.json build profile (preview = standalone installable; development needs a dev server)"
        type: choice
        default: preview
        options: [preview, development, production]
      submit:
        description: "Auto-submit the finished iOS build to TestFlight (needs Apple credentials stored with EAS; ignored for Android)"
        type: boolean
        default: false

jobs:
  eas-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Check EXPO_TOKEN is configured
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::error::Missing repository secret EXPO_TOKEN — create one at expo.dev -> Account Settings -> Access tokens"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Align Expo SDK package versions
        run: npx expo install --fix

      - name: Link or create the EAS project
        run: eas init --non-interactive --force

      - name: Queue EAS build
        run: |
          # --auto-submit: Expo's cloud submits the finished build to
          # TestFlight using the Apple credentials stored with EAS (one-time
          # interactive setup). iOS only — there is no Play Store setup.
          submit_flag=""
          if [ "${{ inputs.submit }}" = "true" ] && [ "${{ inputs.platform }}" = "ios" ]; then
            submit_flag="--auto-submit"
          fi
          eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} \
            --non-interactive --no-wait $submit_flag 2>&1 | tee build-output.txt
          url=$(grep -Eo 'https://expo\.dev/[^ ]*builds/[a-z0-9-]+' build-output.txt | head -1 || true)
          {
            echo "## EAS build queued"
            echo ""
            echo "Platform: **${{ inputs.platform }}** — profile: **${{ inputs.profile }}**"
            if [ -n "$submit_flag" ]; then
              echo ""
              echo "Auto-submit to TestFlight: **requested** (submission runs in Expo's cloud when the build finishes)"
            fi
            echo ""
            if [ -n "$url" ]; then
              echo "Build page (install link/QR appears when finished): $url"
            else
              echo "Build page: https://expo.dev — open the project's Builds tab"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
