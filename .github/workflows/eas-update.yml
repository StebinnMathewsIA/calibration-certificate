name: eas-update

# Publishes the app's JS over the air (#61): every push to main that touches
# the app ships to the "preview" channel, and installed preview builds pick
# it up on next launch — no dev PC involved.
#
# Required repository secret: EXPO_TOKEN (same as eas-build).

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "shared/**"
  workflow_dispatch:
    inputs:
      channel:
        description: "Update channel to publish to"
        type: choice
        default: preview
        options: [preview, production]

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Check EXPO_TOKEN is configured
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::error::Missing repository secret EXPO_TOKEN"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Link the EAS project
        run: eas init --non-interactive --force

      - name: Publish update
        run: |
          channel="${{ inputs.channel || 'preview' }}"
          eas update --channel "$channel" --non-interactive \
            --message "${GITHUB_SHA::8}: $(git log -1 --pretty=%s)" 2>&1 | tee update.txt
          {
            echo "## EAS Update published"
            echo ""
            echo "Channel: **$channel** — installed builds on this channel load it on next launch."
            grep -Eo 'https://expo\.dev/[^ ]*' update.txt | head -3 || true
          } >> "$GITHUB_STEP_SUMMARY"
